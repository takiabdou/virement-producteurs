{% extends 'core/base.html' %}
{% block titre %}Confirmer la suppression{% endblock %}
{% block contenu %}
<div class="card">
    <h1>Confirmer la suppression</h1>
    <p>Êtes-vous sûr de vouloir supprimer <strong>{{ objet }}</strong> ?</p>
    <p style="color:#c0392b; margin-top:0.5rem;">
        ⚠ Tous les Bureaux Locaux et utilisateurs rattachés seront supprimés.
    </p>
    <form method="post" style="margin-top:1rem;">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-rouge">Oui, supprimer</button>
            <a href="{% url 'crma_liste' %}" class="btn btn-gris">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
