<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a5276">
    <title>Connexion — Virement Producteurs</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a5276 0%, #154360 60%, #0e2f44 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-box {
            background: white;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-logo .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .login-logo h1 {
            font-size: 1.3rem;
            color: #1a5276;
            font-weight: bold;
        }
        .login-logo p {
            font-size: 0.82rem;
            color: #888;
            margin-top: 0.2rem;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.88rem;
            font-weight: bold;
            color: #444;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1a5276;
            box-shadow: 0 0 0 3px rgba(26,82,118,0.12);
        }
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: #1a5276;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background: #154360; }
        .btn-login:active { background: #0e2f44; }
        .erreur {
            background: #fdedec;
            color: #c0392b;
            padding: 0.7rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.2rem;
            font-size: 0.88rem;
            border-left: 3px solid #c0392b;
        }
        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-logo">
        <div class="icon">🏦</div>
        <h1>Virement Producteurs</h1>
        <p>Caisses Régionales de Mutualité Agricole</p>
    </div>

    {% for message in messages %}
    <div class="erreur">{{ message }}</div>
    {% endfor %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Identifiant</label>
            <input type="text" id="username" name="username"
                   autofocus autocomplete="username" required
                   placeholder="Votre identifiant">
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password"
                   autocomplete="current-password" required
                   placeholder="••••••••">
        </div>
        <button type="submit" class="btn-login">Se connecter →</button>
    </form>

    <div class="footer-note">
        CNMA — Application interne réservée aux agents CRMA
    </div>
</div>
</body>
</html>
