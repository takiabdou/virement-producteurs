services:
  db:
    image: postgres:16
    container_name: virement_db
    restart: always
    environment:
      POSTGRES_DB: virement_producteurs
      POSTGRES_USER: virement_user
      POSTGRES_PASSWORD: changeme_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: